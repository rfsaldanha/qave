name: qave
region: nyc
services:
  - name: web
    github:
      repo: rfsaldanha/qave
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: HOST
        scope: RUN_TIME
        value: "0.0.0.0"
      - key: PORT
        scope: RUN_TIME
        value: "8080"
      - key: DB_NAME
        scope: RUN_TIME
        value: qave-leaderboard
      - key: DB_HOST
        scope: RUN_TIME
        value: db-postgresql-sfo3-66309-do-user-737434-0.m.db.ondigitalocean.com
      - key: DB_PORT
        scope: RUN_TIME
        value: "25060"
      - key: DB_USER
        scope: RUN_TIME
        value: qave-app
      - key: DB_SSLMODE
        scope: RUN_TIME
        value: require
      - key: DB_PASSWORD
        scope: RUN_TIME
        type: SECRET
        value: replace-me-before-deploy
